services:
  - type: web
    name: sports-predictor
    runtime: image
    image:
      url: docker.io/hezedev/sports-predictor:latest
      creds:
        fromRegistryCreds:
          name: sports-predictor
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: INFO
      - key: INITIAL_BANKROLL
        value: "1000.0"
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: BALLDONTLIE_API_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: ODDS_API_KEYS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_REASONING_MODEL
        value: claude-haiku-4-5-20251001
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_REASONING_MODEL
        value: openai/gpt-oss-120b:free
      - key: NEWS_API_KEY
        sync: false
      - key: HIGHLIGHTLY_API_KEY
        sync: false
    healthCheckPath: /
