# ============================================================
# Sports Predictor - Master Configuration
# ============================================================

# ----------------------------------------------------------
# Project paths (relative to project root)
# ----------------------------------------------------------
paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  models: "data/models"
  cache: "data/cache"

# ----------------------------------------------------------
# API Configuration
# ----------------------------------------------------------
apis:
  football_data:
    base_url: "https://api.football-data.org/v4"
    rate_limit_per_minute: 10
    # Competitions to track (football-data.org codes)
    competitions:
      - "PL"    # Premier League
      - "ELC"   # Championship
      - "BL1"   # Bundesliga
      - "SA"    # Serie A
      - "PD"    # La Liga
      - "FL1"   # Ligue 1
      - "CL"    # UEFA Champions League
      - "PPL"   # Primeira Liga
      - "DED"   # Eredivisie
      - "BSA"   # Campeonato Brasileiro Serie A

  api_sports:
    base_url: "https://v3.football.api-sports.io"
    basketball_url: "https://v1.basketball.api-sports.io"
    tennis_url: "https://v1.tennis.api-sports.io"
    rate_limit_per_day: 100

  odds_api:
    base_url: "https://api.the-odds-api.com/v4"
    regions:
      - "eu"
      - "uk"
    markets:
      - "h2h"         # moneyline / 1X2
      - "spreads"      # handicap
      - "totals"       # over/under
    rate_limit_per_month: 500

# ----------------------------------------------------------
# Sport-Specific Settings
# ----------------------------------------------------------
